# Пример: админка Next.js за nginx на том же хосте, что и API.
# Скопируйте в свой репозиторий инфраструктуры и подставьте домены/сеть.

services:
  porublyu-admin:
    build:
      context: ./porublyuadmin
      args:
        NEXT_PUBLIC_API_URL: https://backend.porublyu.parmenid.tech/api/v1/admin
    environment:
      API_URL: https://backend.porublyu.parmenid.tech/api/v1/admin
      NEXT_PUBLIC_API_URL: https://backend.porublyu.parmenid.tech/api/v1/admin
    expose:
      - "3000"
    restart: unless-stopped
    # networks:
    #   - porublyu_net

